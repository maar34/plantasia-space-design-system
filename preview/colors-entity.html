<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; font-family: 'Inter', sans-serif; padding: 18px; }
  .row { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; }
  .chip { width: 48px; height: 48px; border-radius: 4px; flex-shrink: 0; }
  .info .name { font-family: 'Orbit', sans-serif; font-size: 13px; font-weight: 400; }
  .info .val { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #555; }
  .info .role { font-size: 11px; color: #777; margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="chip" style="background: oklch(0.78 0.12 350);"></div>
  <div class="info">
    <div class="name">Track / Audio</div>
    <div class="val">oklch(0.78 0.12 350)</div>
    <div class="role">Square frame · pink-red</div>
  </div>
</div>
<div class="row">
  <div class="chip" style="background: oklch(0.78 0.10 230);"></div>
  <div class="info">
    <div class="name">Entangled World</div>
    <div class="val">oklch(0.78 0.10 230)</div>
    <div class="role">Rounded-rect + destructive border · sky blue</div>
  </div>
</div>
<div class="row">
  <div class="chip" style="background: oklch(0.78 0.12 165);"></div>
  <div class="info">
    <div class="name">Orbiter</div>
    <div class="val">oklch(0.78 0.12 165)</div>
    <div class="role">Hexagon clip-path · green</div>
  </div>
</div>
<div class="row">
  <div class="chip" style="background: oklch(0.8982 0.1458 194.87);"></div>
  <div class="info">
    <div class="name">Collection</div>
    <div class="val">oklch(0.8982 0.1458 194.87) — ps-teal</div>
    <div class="role">Diamond clip-path · teal</div>
  </div>
</div>
</body>
</html>
