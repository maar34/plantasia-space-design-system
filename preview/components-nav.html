<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #f0f0f0; font-family: 'Inter', sans-serif; padding: 18px; }
  .section-label {
    font-family: 'Orbit', sans-serif; font-size: 9px; color: #888;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; margin-top: 18px;
  }
  .section-label:first-child { margin-top: 0; }

  /* ── Header ───────────────────────────────────── */
  .ps-header {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid oklch(0.6903 0.2708 340.88);
    height: 52px;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 0 16px;
    border-radius: 8px 8px 0 0;
  }
  .h-section { display: flex; align-items: center; gap: 6px; }
  .h-right { justify-content: flex-end; }
  .h-center { justify-content: center; }
  .h-logo { height: 52px; padding: 12px 0; display: flex; align-items: center; }
  .h-logo img { height: 100%; width: auto; filter: brightness(0); }
  .icon-btn {
    width: 32px; height: 32px; border-radius: 6px; border: none;
    background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { background: #000; }
  .icon-btn:hover svg { stroke: #fff; }
  .icon-btn svg { stroke: #000; }
  .h-btn {
    padding: 4px 12px; border-radius: 6px; font-size: 11px;
    background: transparent; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-weight: 500;
  }
  .h-btn-primary { background: oklch(0.6903 0.2708 340.88); color: #fff; }
  .h-btn-ghost { color: #000; }
  .h-btn-ghost:hover { background: #000; color: #fff; }

  /* ── App shell ───────────────────────────────── */
  .app-shell { display: flex; background: #fff; border: 1px solid #000; border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }

  /* ── Sidebar collapsed ───────────────────────── */
  .sidebar {
    background: #fff; border-right: 1px solid #000;
    padding: 8px; display: flex; flex-direction: column; gap: 4px;
  }
  .sidebar.collapsed { width: 52px; }
  .sidebar.expanded  { width: 200px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 8px; border-radius: 8px; cursor: pointer;
    white-space: nowrap; overflow: hidden;
  }
  .nav-item:hover { background: #000; }
  .nav-item:hover .nav-icon { filter: invert(1) !important; }
  .nav-item:hover .nav-label { color: #fff; }
  .nav-item.active { background: #000; }
  .nav-item.active .nav-icon { filter: invert(1) !important; }
  .nav-item.active .nav-label { color: #fff; }

  /* Force icons dark on white bg, then invert when active/hover */
  .nav-icon { width: 18px; height: 18px; flex-shrink: 0; filter: brightness(0); opacity: 0.75; }
  .nav-icon-svg { width: 18px; height: 18px; flex-shrink: 0; }
  .nav-item:hover .nav-icon-svg { stroke: #fff !important; }
  .nav-item.active .nav-icon-svg { stroke: #fff !important; }

  .nav-label { font-size: 12px; color: #000; }
  .nav-sep { border: none; border-top: 1px solid #000; margin: 4px 0; opacity: 0.1; }
  .nav-spacer { flex: 1; }
  .sidebar-footer { padding: 8px; border-top: 1px solid #000; }
  .user-row { display: flex; align-items: center; gap: 8px; padding: 4px; }
  .user-avatar {
    width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
    background: oklch(0.8982 0.1458 194.87);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbit', sans-serif; font-size: 11px; color: #000;
  }
  .user-name { font-size: 11px; font-weight: 500; }
  .user-handle { font-size: 9px; opacity: 0.45; }

  /* Main area */
  .main-area { flex: 1; padding: 16px; min-height: 100px; display: flex; align-items: center; justify-content: center; }
  .placeholder { font-size: 11px; color: #ccc; font-style: italic; }

  /* ── Mobile bar ───────────────────────────────── */
  .mobile-bar {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid oklch(0.6903 0.2708 340.88);
    height: 60px; display: flex;
    align-items: center; justify-content: space-around;
    padding: 0 4px; border-radius: 8px;
    margin-top: 10px;
  }
  .mob-item {
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 6px 10px; border-radius: 8px; cursor: pointer;
  }
  .mob-item img { width: 20px; height: 20px; filter: brightness(0); opacity: 0.55; }
  .mob-item svg { opacity: 0.55; }
  .mob-item span { font-size: 9px; color: #555; }
  .mob-item:hover, .mob-item.active { background: #000; }
  .mob-item:hover img, .mob-item.active img { filter: invert(1); opacity: 1; }
  .mob-item:hover svg, .mob-item.active svg { stroke: #fff; opacity: 1; }
  .mob-item:hover span, .mob-item.active span { color: #fff; }
</style>
</head>
<body>

<!-- ── Desktop header ───────────────────────────────────────── -->
<div class="section-label">Desktop Header — guest</div>
<div class="ps-header">
  <div class="h-section">
    <!-- Lucide panel-left icon -->
    <button class="icon-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1">
        <rect x="3" y="3" width="7" height="18" rx="1"/>
        <line x1="14" y1="7" x2="21" y2="7"/>
        <line x1="14" y1="12" x2="21" y2="12"/>
        <line x1="14" y1="17" x2="21" y2="17"/>
      </svg>
    </button>
  </div>
  <div class="h-section h-center">
    <div class="h-logo"><img src="https://herbarium.plantasia.space/assets/logos/v2/2025/plantasia-space-logo-black-transparent-background-512.svg" alt="plantasia.space"></div>
  </div>
  <div class="h-section h-right">
    <button class="h-btn h-btn-ghost">Log in</button>
    <button class="h-btn h-btn-primary">Sign up free</button>
  </div>
</div>

<!-- ── Desktop App Shell ─────────────────────────────────────── -->

    <div class="app-shell" style="border:none; border-radius:0;">
      <div class="sidebar collapsed">
        <div class="nav-item active"><img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/home.svg" alt=""></div>
        <div class="nav-item">
          <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div class="nav-item"><img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/xplorer.svg" alt=""></div>
        <div class="nav-item"><img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/release.svg" alt=""></div>
        <div class="nav-item"><img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/track.svg" alt=""></div>
        <div class="nav-item"><img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/orbiter.svg" alt=""></div>
        <div class="nav-item"><img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/entangled-world.svg" alt=""></div>
        <div class="nav-item"><img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/collection.svg" alt=""></div>
        <div class="nav-spacer"></div>
        <div class="sidebar-footer" style="border-top:1px solid #000; padding:6px 8px; display:flex; justify-content:center;">
          <div class="user-avatar">J</div>
        </div>
      </div>
      <div class="main-area" style="min-width:80px;"><div class="placeholder">content</div></div>
    </div>
  </div>

  <!-- Expanded sidebar -->
  <div style="border: 1px solid #000; border-radius: 8px; overflow:hidden; background:#f8f8f8;">
    <div style="font-size:9px; font-family:'JetBrains Mono',monospace; color:#aaa; padding:6px 8px; background:#f0f0f0; border-bottom:1px solid #ddd;">Expanded</div>
    <div class="app-shell" style="border:none; border-radius:0;">
      <div class="sidebar expanded">
        <div class="nav-item active">
          <img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/xplorer.svg" alt="">
          <span class="nav-label">Home</span>
        </div>
        <div class="nav-item">
          <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span class="nav-label">Search</span>
        </div>
        <div class="nav-item">
          <img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/xplorer.svg" alt="">
          <span class="nav-label">xPlorer</span>
        </div>
        <div class="nav-item">
          <img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/release.svg" alt="">
          <span class="nav-label">Release</span>
        </div>
        <hr class="nav-sep">
        <div class="nav-item">
          <img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/track.svg" alt="">
          <span class="nav-label">Audios</span>
        </div>
        <div class="nav-item">
          <img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/orbiter.svg" alt="">
          <span class="nav-label">Orbiters</span>
        </div>
        <div class="nav-item">
          <img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/entangled-world.svg" alt="">
          <span class="nav-label">Entangled Worlds</span>
        </div>
        <div class="nav-item">
          <img class="nav-icon" src="https://herbarium.plantasia.space/assets/symbols/v2/collection.svg" alt="">
          <span class="nav-label">Collections</span>
        </div>
        <div class="nav-spacer"></div>
        <div class="sidebar-footer">
          <div class="user-row">
            <div class="user-avatar">J</div>
            <div>
              <div class="user-name">Jasmine Moss</div>
              <div class="user-handle">@jasmine · Bloom</div>
            </div>
          </div>
        </div>
      </div>
      <div class="main-area" style="min-width:120px;"><div class="placeholder">content</div></div>
    </div>
  </div>
</div>

<!-- ── Mobile bottom bar ───────────────────────────────────── -->
<div class="section-label">Mobile Bottom Bar</div>
<div class="mobile-bar">
  <div class="mob-item active">
    <img src="https://herbarium.plantasia.space/assets/symbols/v2/xplorer.svg" alt="Home">
    <span>Home</span>
  </div>
  <div class="mob-item">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </div>
  <div class="mob-item">
    <img src="https://herbarium.plantasia.space/assets/symbols/v2/xplorer.svg" alt="xPlorer">
    <span>xPlorer</span>
  </div>
  <div class="mob-item">
    <img src="https://herbarium.plantasia.space/assets/symbols/v2/release.svg" alt="Release">
    <span>Release</span>
  </div>
  <div class="mob-item">
    <img src="https://herbarium.plantasia.space/assets/symbols/v2/orbiter.svg" alt="Orbiters">
    <span>Orbiters</span>
  </div>
</div>

</body>
</html>
