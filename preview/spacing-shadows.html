<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; font-family: 'Inter', sans-serif; padding: 18px 22px; }
  .title { font-family: 'Orbit', sans-serif; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .note { font-size: 11px; color: #555; line-height: 1.5; margin-bottom: 14px; background: #f8f8f8; padding: 10px 14px; border-left: 3px solid #000; }
  .row { display: flex; gap: 16px; align-items: center; margin-bottom: 10px; }
  .box { width: 60px; height: 36px; border-radius: 8px; }
  .lbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #444; }
</style>
</head>
<body>
  <div class="title">Shadow System</div>
  <div class="note">
    plantasia.space uses <strong>no box shadows</strong>. All <code style="font-family:'JetBrains Mono',monospace;font-size:10px;">--shadow-*</code> variables resolve to zero. Depth is achieved through borders and color contrast instead.
  </div>
  <div class="row">
    <div class="box" style="background:#000; border: 1px solid #000;"></div>
    <div class="lbl">Border: 1px solid var(--border)</div>
  </div>
  <div class="row">
    <div class="box" style="background:#fff; border: 1px solid #000;"></div>
    <div class="lbl">Card: border-only, no elevation</div>
  </div>
  <div class="row">
    <div class="box" style="background:oklch(0.6903 0.2708 340.88); border: 2px solid oklch(0.6903 0.2708 340.88);"></div>
    <div class="lbl">Accent: 2px border-2 (--ps-pink)</div>
  </div>
</body>
</html>
