<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; font-family: 'Inter', sans-serif; padding: 16px 20px; }
  .section-label {
    font-family: 'Orbit', sans-serif; font-size: 9px; color: #888;
    text-transform: uppercase; letter-spacing: .08em; margin-bottom: 10px;
  }
  .section-label:not(:first-child) { margin-top: 14px; }
  .grid { display: flex; gap: 12px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 56px; }
  .icon-wrap {
    width: 44px; height: 44px; border-radius: 8px; border: 1px solid #eee;
    background: #fafafa; display: flex; align-items: center; justify-content: center;
  }
  .icon-wrap.dark { background: #000; border-color: #111; }
  .icon-wrap img { width: 26px; height: 26px; object-fit: contain; }
  /* currentColor SVGs: brightness(0) on light = black; invert(1) on dark = white */
  .icon-wrap img     { filter: brightness(0); }
  .icon-wrap.dark img { filter: invert(1); }
  .lbl { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: #666; text-align: center; line-height: 1.3; }
  .cdn-note { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: #bbb; margin-top: 6px; }
</style>
</head>
<body>
<script>
const CDN = 'https://herbarium.plantasia.space/assets';
const ICONS = [
  { name: 'track',           url: `${CDN}/symbols/v2/track.svg` },
  { name: 'orbiter',         url: `${CDN}/symbols/v2/orbiter.svg` },
  { name: 'world',           url: `${CDN}/symbols/v2/entangled-world.svg` },
  { name: 'collection',      url: `${CDN}/symbols/v2/collection.svg` },
  { name: 'release',         url: `${CDN}/symbols/v2/release.svg` },
  { name: 'xplorer',         url: `${CDN}/symbols/v2/xplorer.svg` },
];

function makeGrid(dark) {
  return ICONS.map(ic => `
    <div class="item">
      <div class="icon-wrap${dark ? ' dark' : ''}">
        <img src="${ic.url}" alt="${ic.name}">
      </div>
      <div class="lbl">${ic.name}</div>
    </div>`).join('');
}

document.write(`
  <div class="section-label">Entity Icons — light bg</div>
  <div class="grid">${makeGrid(false)}</div>
  <div class="section-label">Entity Icons — dark bg</div>
  <div class="grid">${makeGrid(true)}</div>
  <div class="cdn-note">CDN: herbarium.plantasia.space/assets/symbols/v2/*.svg</div>
`);
</script>
</body>
</html>
