<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #000; font-family: 'Inter', sans-serif; padding: 18px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .cell { display: flex; flex-direction: column; gap: 4px; }
  .chip { height: 36px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.15); }
  .lbl { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: #aaa; line-height: 1.3; }
  .title { font-family: 'Orbit', sans-serif; font-size: 11px; margin-bottom: 10px; color: #fff; }
</style>
</head>
<body>
<div class="title">Dark Mode Tokens</div>
<div class="grid">
  <div class="cell"><div class="chip" style="background:oklch(0 0 0);"></div><div class="lbl">background</div></div>
  <div class="cell"><div class="chip" style="background:oklch(1 0 0);"></div><div class="lbl">foreground</div></div>
  <div class="cell"><div class="chip" style="background:oklch(0.8982 0.1458 194.87);"></div><div class="lbl">primary (teal)</div></div>
  <div class="cell"><div class="chip" style="background:oklch(0.6903 0.2708 340.88);"></div><div class="lbl">secondary (pink)</div></div>
  <div class="cell"><div class="chip" style="background:oklch(1 0 0);"></div><div class="lbl">border</div></div>

  <div class="cell"><div class="chip" style="background:oklch(0.8982 0.1458 194.87);"></div><div class="lbl">border-2</div></div>
  <div class="cell"><div class="chip" style="background:oklch(0.5897 0 0);"></div><div class="lbl">input</div></div>
  <div class="cell"><div class="chip" style="background:oklch(0.6489 0.2370 26.97);"></div><div class="lbl">destructive</div></div>
  <div class="cell"><div class="chip" style="background:oklch(0.8724 0.2723 143.45);"></div><div class="lbl">success</div></div>
  <div class="cell"><div class="chip" style="background:oklch(0.6903 0.2708 340.88);"></div><div class="lbl">sidebar-primary</div></div>
</div>
</body>
</html>
