<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #fff; font-family: 'Inter', sans-serif; padding: 18px 22px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
  .section-label { font-family: 'Orbit', sans-serif; font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; margin-top: 8px; }

  /* Button base */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; white-space: nowrap; border-radius: 6px;
    font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
    padding: 6px 16px; height: 36px; cursor: pointer;
    transition: all 0.15s; border: 1px solid transparent;
  }
  .btn-default {
    background: oklch(0.6903 0.2708 340.88);
    color: #fff;
    border-color: transparent;
  }
  .btn-default:hover {
    background: #fff;
    color: oklch(0.6903 0.2708 340.88);
    border-color: oklch(0.6903 0.2708 340.88);
  }
  .btn-outline {
    background: #fff; color: #000;
    border-color: #000;
  }
  .btn-outline:hover { background: #000; color: #fff; }

  .btn-ghost {
    background: transparent; color: #000; border-color: transparent;
  }
  .btn-ghost:hover { background: #000; color: #fff; }

  .btn-destructive {
    background: transparent;
    color: oklch(62.793% 0.25768 29.223);
    border-color: oklch(62.793% 0.25768 29.223);
  }
  .btn-outline-accent {
    background: #fff;
    color: oklch(0.6903 0.2708 340.88);
    border-color: oklch(0.6903 0.2708 340.88);
  }
  .btn-secondary {
    background: oklch(0.8982 0.1458 194.87);
    color: oklch(0.6903 0.2708 340.88);
    border-color: transparent;
  }
  .btn-link {
    background: transparent; color: oklch(0.6903 0.2708 340.88);
    border: none; text-decoration: underline; text-underline-offset: 4px;
  }
  .btn-sm { height: 28px; font-size: 12px; padding: 4px 12px; border-radius: 6px; }
  .btn-lg { height: 40px; font-size: 14px; padding: 8px 24px; border-radius: 6px; }
  .btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 6px; }
</style>
</head>
<body>
  <div class="section-label">Variants</div>
  <div class="row">
    <button class="btn btn-default">Default</button>
    <button class="btn btn-outline">Outline</button>
    <button class="btn btn-ghost">Ghost</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-outline-accent">Outline Accent</button>
    <button class="btn btn-destructive">Destructive</button>
    <button class="btn btn-link">Link</button>
  </div>
  <div class="section-label">Sizes</div>
  <div class="row">
    <button class="btn btn-default btn-sm">Small</button>
    <button class="btn btn-default">Default</button>
    <button class="btn btn-default btn-lg">Large</button>
    <button class="btn btn-outline btn-icon">⊕</button>
  </div>
  <div class="section-label">Disabled</div>
  <div class="row">
    <button class="btn btn-default" disabled style="opacity:0.5;cursor:not-allowed;">Default</button>
    <button class="btn btn-outline" disabled style="opacity:0.5;cursor:not-allowed;">Outline</button>
  </div>
</body>
</html>
